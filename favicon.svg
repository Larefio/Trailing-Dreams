  <rect width="100" height="100" rx="25" fill="url(#grad)" />
  <text x="50" y="55" font-family="Montserrat, system-ui, sans-serif" font-size="44" font-weight="800" fill="#FFFFFF" text-anchor="middle" alignment-baseline="middle" filter="url(#shadow)">TD</text>
