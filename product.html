<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Product details. Learn measurements, specs and care detailed directions." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet" />
    <title>Product Details – Trailing Dreams</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <main class="shop-page">
      <div class="container">
        <div class="product-detail-container">
          
          <div class="gallery-container">
            <div class="main-image-container">
              <img id="main-product-img" src="img/Darlingtonia.jpg" alt="Plant main view" />
            </div>
            <div class="thumbnails-container">
              <img class="thumb-img active" src="img/Darlingtonia.jpg" alt="Perspective view 1" />
              <img class="thumb-img" src="img/Darlingtonia.jpg" alt="Perspective view 2" style="filter: hue-rotate(45deg);" />
              <img class="thumb-img" src="img/Darlingtonia.jpg" alt="Perspective view 3" style="filter: hue-rotate(90deg);" />
            </div>
          </div>

          <div class="info-container">
            <h1 id="product-title">Plant Name</h1>
            <p id="product-price" class="product-detail-price">$0</p>
            
            <div class="product-description-block">
              <h3>Description</h3>
              <p id="product-desc">
                Loading product description...
              </p>
            </div>

            <div class="product-specs-grid">
              <div class="spec-item">
                <span>Height</span>
                <p id="product-height">Loading...</p>
              </div>
              <div class="spec-item">
                <span>Pot Size</span>
                <p id="product-pot">Loading...</p>
              </div>
              <div class="spec-item">
                <span>Light</span>
                <p id="product-light">Loading...</p>
              </div>
              <div class="spec-item">
                <span>Watering</span>
                <p id="product-water">Loading...</p>
              </div>
            </div>

            <div class="quantity-cart-container">
              <div class="quantity-selector">
                <button type="button" class="qty-btn" id="qty-minus">—</button>
                <input type="number" id="product-qty" value="1" min="1" />
                <button type="button" class="qty-btn" id="qty-plus">+</button>
              </div>
              <button id="add-to-cart-btn" class="btn btn-primary btn-add-to-cart">Add to Cart</button>
            </div>
          </div>

        </div>
      </div>
    </main>

        <div id="footer-placeholder"></div>

    <script src="js/components.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
