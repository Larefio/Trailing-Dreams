<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Market Plant</title>
    <link rel="stylesheet" href="./Css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar">
        <a href="index.html">
          <img src="img/logo.svg" alt="logo market" class="logo" />
        </a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><a href="product.html">Product</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main class="contact">
      <div class="container">
        <section class="contact-card">
          <div class="contact-header">
            <h1>Contáctanos</h1>
            <p>
              Estamos aquí para ayudarte a llenar tu hogar de vida. Escríbenos y
              te responderemos lo antes posible.
            </p>
          </div>

          <div class="contact-grid">
            <div class="contact-sidebar">
              <div class="info-item">
                <span>Email</span>
                <a href="mailto:example@gmail.com">example@gmail.com</a>
              </div>
              <div class="info-item">
                <span>WhatsApp</span>
                <a href="https://wa.me/51999999999">999 999 999</a>
              </div>
              <div class="info-item">
                <span>Ubicación</span>
                <p>Usa, Texas</p>
              </div>
            </div>

            <form class="contact-form">
              <div class="form-group">
                <label>Tu Nombre</label>
                <input type="text" placeholder="Ej. Luis Arnao" required />
              </div>

              <div class="form-group">
                <label>Tu Email</label>
                <input type="email" placeholder="Luis@ejemplo.com" required />
              </div>

              <div class="form-group">
                <label>Tu Mensaje</label>
                <textarea
                  rows="4"
                  placeholder="¿En qué podemos ayudarte?"
                  required
                ></textarea>
              </div>

              <button type="submit" class="btn">Enviar Mensaje</button>
            </form>
          </div>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-wave"></div>

      <div class="container">
        <p>© 2026 Trailing Dreams – Plants and Things</p>
      </div>
    </footer>
  </body>
</html>
