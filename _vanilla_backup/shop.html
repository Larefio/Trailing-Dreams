<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Trailing Dreams plant catalog. Explore our selection of exotic species and care products."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Plant Catalog – Trailing Dreams</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <main class="shop-page">
      <div class="container">
        <div class="shop-layout">
          <aside class="sidebar">
            <h2>Categories</h2>
            <div class="categories-wrapper">
              <button class="category-btn active" data-category="all">
                All Plants
              </button>
              <button class="category-btn" data-category="carnivorous">
                Carnivorous
              </button>
              <button class="category-btn" data-category="indoor">
                Indoor Plants
              </button>
              <button class="category-btn" data-category="succulents">
                Succulents
              </button>
              <button class="category-btn" data-category="tropical">
                Tropical
              </button>
            </div>
          </aside>

          <div class="main-content">
            <div class="search" role="search">
              <input
                type="text"
                id="shop-search-input"
                placeholder="Search plants..."
                aria-label="Search plants from our collection"
              />
            </div>

            <div
              id="shop-empty-state"
              class="empty-state"
              style="display: none"
            >
              <p>No plants match your search filter.</p>
            </div>

            <section class="products-grid" id="products-grid" aria-label="Product Catalog">
            </section>
          </div>
        </div>
      </div>
    </main>

        <div id="footer-placeholder"></div>

    <script src="js/components.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
