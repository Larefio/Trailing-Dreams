<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Contact — Trailing Dreams. Write to us for plant inquiries, orders, and support."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Contact – Trailing Dreams</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <main class="contact-page-premium">
      <div class="contact-split-wrapper">
        <div class="contact-image-side">
          <img src="img/contact_desk.png" alt="Contact Us Desk" class="contact-hero-img" />
          <div class="contact-image-overlay">
            <h2>Let's Talk Plants.</h2>
            <p>We are here to help your indoor jungle thrive. Reach out with any questions, requests, or just to say hello.</p>
            
            <div class="contact-info-list">
              <div class="contact-info-row">
                <span class="info-icon">✉️</span>
                <div class="info-text">
                  <strong>Email</strong>
                  <a href="mailto:info@trailingdreams.com">info@trailingdreams.com</a>
                </div>
              </div>
              <div class="contact-info-row">
                <span class="info-icon">💬</span>
                <div class="info-text">
                  <strong>WhatsApp</strong>
                  <a href="https://wa.me/51999999999" target="_blank" rel="noopener noreferrer">+51 999 999 999</a>
                </div>
              </div>
              <div class="contact-info-row">
                <span class="info-icon">📍</span>
                <div class="info-text">
                  <strong>Location</strong>
                  <p>Tyler, Tx</p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="contact-form-side">
          <div class="form-side-header">
            <h1>Get in Touch</h1>
            <p>Send us a message and we'll get back to you as soon as possible.</p>
          </div>

          <form class="premium-form" action="#" method="POST" aria-label="Contact Form">
            <div class="form-row">
              <div class="form-group">
                <label for="name">Your Name</label>
                <input id="name" name="name" type="text" placeholder="e.g. John Doe" autocomplete="name" required />
              </div>
              <div class="form-group">
                <label for="email">Your Email</label>
                <input id="email" name="email" type="email" placeholder="john@example.com" autocomplete="email" required />
              </div>
            </div>
            
            <div class="form-group">
              <label for="subject">Subject (Optional)</label>
              <input id="subject" name="subject" type="text" placeholder="What is this regarding?" />
            </div>

            <div class="form-group">
              <label for="message">Your Message</label>
              <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-submit-premium" aria-label="Send contact message">
              Send Message
            </button>
          </form>
        </div>
      </div>
    </main>

        <div id="footer-placeholder"></div>

    <script src="js/components.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
