<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Your shopping cart — Trailing Dreams. Review your selected exotic plants and proceed to checkout."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Shopping Cart – Trailing Dreams</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <main class="shop-page">
      <div class="container">
        <div class="cart-header">
          <h1>Your Cart</h1>
        </div>

        <div class="cart-layout" id="cart-main-layout">
          <div class="cart-items-wrapper" id="cart-items-list">
          </div>

          <aside class="cart-summary-sidebar">
            <div class="summary-card">
              <h2>Order Summary</h2>
              <div class="summary-row">
                <span>Subtotal</span>
                <span id="cart-subtotal">$100</span>
              </div>
              <div class="summary-row">
                <span>Shipping</span>
                <span id="cart-shipping">$10</span>
              </div>
              <div class="summary-row total-row">
                <span>Total</span>
                <span id="cart-total">$110</span>
              </div>
              <button id="checkout-btn" class="btn btn-primary btn-checkout">
                Proceed to Checkout
              </button>
            </div>
          </aside>
        </div>

        <div id="cart-empty-state" class="empty-state" style="display: none">
          <p>Your cart is currently empty.</p>
          <a href="shop.html" class="btn btn-primary">Return to Shop</a>
        </div>
      </div>
    </main>

        <div id="footer-placeholder"></div>

    <script src="js/components.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
